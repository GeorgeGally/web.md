<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web/md</title>
  <style>
.webmd-popup {
  width: 200px;
  padding: 16px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  color: #1a1a1a;
  background: #fefefe;
}
.webmd-title {
  font-size: 16px;
  font-weight: 700;
  margin: 0 0 14px 0;
  letter-spacing: -0.5px;
}
.webmd-status {
  font-size: 11px;
  color: #888;
  margin-bottom: 8px;
  min-height: 14px;
}
.webmd-status.unavailable {
  color: #c44;
}
.webmd-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.webmd-toggle-label {
  font-size: 13px;
  cursor: pointer;
  user-select: none;
}
.webmd-toggle-switch {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}
.webmd-toggle-switch input {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  z-index: 1;
  margin: 0;
}
.webmd-toggle-slider {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #ccc;
  border-radius: 22px;
  transition: background 0.2s;
  pointer-events: none;
}
.webmd-toggle-slider::before {
  content: '';
  position: absolute;
  height: 16px;
  width: 16px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
  pointer-events: none;
}
.webmd-toggle-switch input:checked + .webmd-toggle-slider {
  background: #1a1a1a;
}
.webmd-toggle-switch input:checked + .webmd-toggle-slider::before {
  transform: translateX(18px);
}
  </style>
</head>
<body>
  <div class="webmd-popup">
    <h1 class="webmd-title">web/md</h1>
    <div id="webmd-status" class="webmd-status"></div>
    <div class="webmd-toggle-row" id="toggle-row">
      <label class="webmd-toggle-label">Enabled</label>
      <div class="webmd-toggle-switch">
        <input type="checkbox" id="always-on-toggle">
        <span class="webmd-toggle-slider"></span>
      </div>
    </div>
  </div>
  <script>
const toggle = document.getElementById('always-on-toggle');
const status = document.getElementById('webmd-status');
const toggleRow = document.getElementById('toggle-row');

function setStatus(text, isError) {
  status.textContent = text;
  status.className = 'webmd-status' + (isError ? ' unavailable' : '');
}

async function init() {
  const result = await chrome.storage.local.get('alwaysOn');
  toggle.checked = result.alwaysOn === true;
  setStatus(toggle.checked ? 'Enabled' : 'Disabled', false);
}

async function handleToggle(enabled) {
  await chrome.storage.local.set({ alwaysOn: enabled });
  setStatus(enabled ? 'Enabling...' : 'Disabling...', false);

  let tabs;
  try {
    tabs = await chrome.tabs.query({ active: true, currentWindow: true });
  } catch (e) {
    setStatus('Error: ' + e.message, true);
    return;
  }

  const tab = tabs && tabs[0];
  if (!tab?.id) {
    setStatus('No active tab', true);
    return;
  }

  const url = tab.url || '';
  if (url.startsWith('chrome://') || url.startsWith('chrome-extension://') || url.startsWith('file://') || url.startsWith('about:')) {
    setStatus('Not available on this page', true);
    return;
  }

  const messageType = enabled ? 'ALWAYS_ON' : 'ALWAYS_OFF';

  try {
    await chrome.tabs.sendMessage(tab.id, { type: messageType });
    setStatus(enabled ? 'Enabled' : 'Disabled', false);
  } catch (e) {
    try {
      await chrome.scripting.executeScript({
        target: { tabId: tab.id },
        files: ['content.js'],
      });
      await new Promise(r => setTimeout(r, 500));
      await chrome.tabs.sendMessage(tab.id, { type: messageType });
      setStatus(enabled ? 'Enabled (injected)' : 'Disabled', false);
    } catch (e2) {
      setStatus('Could not activate: ' + (e2.message || e2), true);
    }
  }
}

toggle.addEventListener('change', () => {
  handleToggle(toggle.checked);
});

toggleRow.addEventListener('click', (e) => {
  if (e.target === toggle) return;
  toggle.checked = !toggle.checked;
  handleToggle(toggle.checked);
});

init();
  </script>
</body>
</html>
