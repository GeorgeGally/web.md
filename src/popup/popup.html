<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web.md</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="webmd-popup">
    <header class="webmd-header">
      <h1 class="webmd-title">web<span class="webmd-dot">.</span><span class="webmd-ext">md</span></h1>
    </header>

    <div class="webmd-control" id="enabled-control">
      <span class="webmd-label">Enabled</span>
      <label class="webmd-toggle">
        <input type="checkbox" id="always-on-toggle">
        <span class="webmd-toggle-track"></span>
        <span class="webmd-toggle-knob"></span>
      </label>
    </div>

    <div class="webmd-extras" id="webmd-extras">
      <div class="webmd-control">
        <span class="webmd-label">Formatted</span>
        <label class="webmd-toggle">
          <input type="checkbox" id="formatted-toggle">
          <span class="webmd-toggle-track"></span>
          <span class="webmd-toggle-knob"></span>
        </label>
      </div>

      <div class="webmd-control">
        <span class="webmd-label">Dark Mode</span>
        <label class="webmd-toggle">
          <input type="checkbox" id="theme-toggle">
          <span class="webmd-toggle-track"></span>
          <span class="webmd-toggle-knob"></span>
        </label>
      </div>

      <div class="webmd-control">
        <span class="webmd-label">Font Size</span>
        <div class="webmd-slider-wrap">
          <input type="range" id="font-size-slider" min="12" max="28" value="17" step="1">
          <span id="font-size-value" class="webmd-slider-val">17</span>
        </div>
      </div>
    </div>

    <div id="webmd-status" class="webmd-status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
