<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web/md</title>
  <style>
.webmd-popup {
  width: 200px;
  padding: 16px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  color: #1a1a1a;
  background: #fefefe;
}

.webmd-title {
  font-size: 16px;
  font-weight: 700;
  margin: 0 0 14px 0;
  letter-spacing: -0.5px;
}

.webmd-status {
  font-size: 11px;
  color: #888;
  margin-bottom: 8px;
  min-height: 14px;
}

.webmd-status.unavailable {
  color: #c44;
}

.webmd-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.webmd-toggle-label {
  font-size: 13px;
  cursor: pointer;
}

.webmd-toggle-switch {
  position: relative;
  width: 40px;
  height: 22px;
}

.webmd-toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}

.webmd-toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #ccc;
  border-radius: 22px;
  transition: background 0.2s;
}

.webmd-toggle-slider::before {
  content: '';
  position: absolute;
  height: 16px;
  width: 16px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}

.webmd-toggle-switch input:checked + .webmd-toggle-slider {
  background: #1a1a1a;
}

.webmd-toggle-switch input:checked + .webmd-toggle-slider::before {
  transform: translateX(18px);
}
  </style>
</head>
<body>
  <div class="webmd-popup">
    <h1 class="webmd-title">web/md</h1>
    <div id="webmd-status" class="webmd-status"></div>
    <div class="webmd-toggle-row">
      <label for="always-on-toggle" class="webmd-toggle-label">Enabled</label>
      <div class="webmd-toggle-switch">
        <input type="checkbox" id="always-on-toggle">
        <span class="webmd-toggle-slider"></span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
